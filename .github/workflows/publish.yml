name: Publish to PyPI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - pyproject.toml
      - .github/workflows/publish.yml

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.changed }}
      version_exists: ${{ steps.check.outputs.exists }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check release eligibility
        id: check
        run: |
          python <<'PY'
          import json
          import os
          import subprocess
          import tomllib
          import urllib.error
          import urllib.request

          with open("pyproject.toml", "rb") as f:
              project = tomllib.load(f)["project"]

          package_name = project["name"]
          current_version = project["version"]
          previous_version = ""

          try:
              previous_pyproject = subprocess.check_output(
                  ["git", "show", "HEAD~1:pyproject.toml"],
                  text=True,
                  stderr=subprocess.DEVNULL,
              )
          except subprocess.CalledProcessError:
              previous_pyproject = ""

          if previous_pyproject:
              previous_version = tomllib.loads(previous_pyproject)["project"]["version"]

          version_changed = current_version != previous_version
          version_exists = False

          try:
              with urllib.request.urlopen(
                  f"https://pypi.org/pypi/{package_name}/json"
              ) as response:
                  pypi_data = json.load(response)
              version_exists = current_version in pypi_data.get("releases", {})
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise

          print(
              f"package={package_name} current={current_version} "
              f"previous={previous_version or '<none>'} "
              f"changed={str(version_changed).lower()} "
              f"exists_on_pypi={str(version_exists).lower()}"
          )

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"changed={'true' if version_changed else 'false'}\n")
              output.write(f"exists={'true' if version_exists else 'false'}\n")
              output.write(f"version={current_version}\n")
          PY

      - name: Note skipped publish
        if: steps.check.outputs.changed == 'true' && steps.check.outputs.exists == 'true'
        run: echo "Version ${{ steps.check.outputs.version }} is already on PyPI; skipping publish."

  publish:
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true' && needs.check-version.outputs.version_exists != 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
